name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for gitleaks commit scanning

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run ruff check fleet/ tests/

      - name: Type-check (mypy)
        run: uv run mypy fleet/

      - name: Test (pytest, coverage gate)
        run: uv run pytest -q --cov=fleet --cov-report=term --cov-fail-under=78

      - name: Dependency audit (pip-audit)
        run: uvx pip-audit

      - name: Secret scan (gitleaks)
        if: matrix.os == 'ubuntu-latest'
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
